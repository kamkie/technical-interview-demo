name: Post-Deploy Smoke

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployment base URL to validate. Falls back to EXTERNAL_CHECK_BASE_URL when omitted."
        required: false
        type: string
      expected_build_version:
        description: "Expected build.version from GET / for promotion-stage identity checks."
        required: false
        type: string
      expected_short_commit_id:
        description: "Expected git.shortCommitId from GET / for promotion-stage identity checks."
        required: false
        type: string
      expected_active_profile:
        description: "Expected runtime.activeProfiles entry when runtime posture checks are enabled."
        required: false
        default: "prod"
        type: string
      expected_session_store_type:
        description: "Expected configuration.session.storeType value when runtime posture checks are enabled."
        required: false
        default: "jdbc"
        type: string
      expected_session_timeout:
        description: "Expected configuration.session.timeout value when runtime posture checks are enabled."
        required: false
        default: "15m"
        type: string

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  external-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check scheduled smoke configuration
        id: config
        shell: bash
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
          INPUT_EXPECTED_BUILD_VERSION: ${{ inputs.expected_build_version }}
          INPUT_EXPECTED_SHORT_COMMIT_ID: ${{ inputs.expected_short_commit_id }}
          INPUT_EXPECTED_ACTIVE_PROFILE: ${{ inputs.expected_active_profile }}
          INPUT_EXPECTED_SESSION_STORE_TYPE: ${{ inputs.expected_session_store_type }}
          INPUT_EXPECTED_SESSION_TIMEOUT: ${{ inputs.expected_session_timeout }}
          EXTERNAL_BASE_URL: ${{ secrets.EXTERNAL_CHECK_BASE_URL }}
          EXTERNAL_JDBC_URL: ${{ secrets.EXTERNAL_CHECK_JDBC_URL }}
          EXTERNAL_JDBC_USER: ${{ secrets.EXTERNAL_CHECK_JDBC_USER }}
          EXTERNAL_JDBC_PASSWORD: ${{ secrets.EXTERNAL_CHECK_JDBC_PASSWORD }}
        run: |
          effective_base_url="${INPUT_BASE_URL:-$EXTERNAL_BASE_URL}"

          if [ -z "${effective_base_url}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "Post-deploy smoke skipped because neither workflow input base_url nor EXTERNAL_CHECK_BASE_URL is configured." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          jdbc_values_present=0
          for value in "${EXTERNAL_JDBC_URL}" "${EXTERNAL_JDBC_USER}" "${EXTERNAL_JDBC_PASSWORD}"; do
            if [ -n "${value}" ]; then
              jdbc_values_present=$((jdbc_values_present + 1))
            fi
          done

          if [ "${jdbc_values_present}" -ne 0 ] && [ "${jdbc_values_present}" -ne 3 ]; then
            echo "JDBC-backed smoke configuration is incomplete. Configure EXTERNAL_CHECK_JDBC_URL, EXTERNAL_CHECK_JDBC_USER, and EXTERNAL_CHECK_JDBC_PASSWORD together or leave all three unset." >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          identity_values_present=0
          for value in "${INPUT_EXPECTED_BUILD_VERSION}" "${INPUT_EXPECTED_SHORT_COMMIT_ID}"; do
            if [ -n "${value}" ]; then
              identity_values_present=$((identity_values_present + 1))
            fi
          done

          if [ "${identity_values_present}" -ne 0 ] && [ "${identity_values_present}" -ne 2 ]; then
            echo "Manual release identity checks require expected_build_version and expected_short_commit_id together." >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          posture_values_present=0
          for value in "${INPUT_EXPECTED_ACTIVE_PROFILE}" "${INPUT_EXPECTED_SESSION_STORE_TYPE}" "${INPUT_EXPECTED_SESSION_TIMEOUT}"; do
            if [ -n "${value}" ]; then
              posture_values_present=$((posture_values_present + 1))
            fi
          done

          if [ "${posture_values_present}" -ne 0 ] && [ "${posture_values_present}" -ne 3 ]; then
            echo "Runtime posture checks require expected_active_profile, expected_session_store_type, and expected_session_timeout together." >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          {
            echo "configured=true"
            echo "base_url=${effective_base_url}"
            echo "expected_build_version=${INPUT_EXPECTED_BUILD_VERSION}"
            echo "expected_short_commit_id=${INPUT_EXPECTED_SHORT_COMMIT_ID}"
            echo "expected_active_profile=${INPUT_EXPECTED_ACTIVE_PROFILE}"
            echo "expected_session_store_type=${INPUT_EXPECTED_SESSION_STORE_TYPE}"
            echo "expected_session_timeout=${INPUT_EXPECTED_SESSION_TIMEOUT}"
          } >> "${GITHUB_OUTPUT}"
          if [ "${jdbc_values_present}" -eq 3 ]; then
            echo "Scheduled smoke will run with HTTP assertions plus JDBC-backed GET /api/session, XSRF bootstrap, authenticated PUT /api/account/language, and Flyway assertions." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Scheduled smoke will run HTTP-only assertions because JDBC access is not configured; authenticated session bootstrap and write proof are skipped by design." >> "${GITHUB_STEP_SUMMARY}"
          fi
          if [ "${identity_values_present}" -eq 2 ]; then
            echo "Manual dispatch will also verify build.version=${INPUT_EXPECTED_BUILD_VERSION} and git.shortCommitId=${INPUT_EXPECTED_SHORT_COMMIT_ID} from GET /." >> "${GITHUB_STEP_SUMMARY}"
          fi
          if [ "${posture_values_present}" -eq 3 ]; then
            echo "Runtime posture validation expects profile=${INPUT_EXPECTED_ACTIVE_PROFILE}, session store=${INPUT_EXPECTED_SESSION_STORE_TYPE}, session timeout=${INPUT_EXPECTED_SESSION_TIMEOUT}, csrfEnabled=true, csrfCookieName=XSRF-TOKEN, csrfHeaderName=X-XSRF-TOKEN, and abuseProtection.owner=edge-or-gateway." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Set up Java 25
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        if: steps.config.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Run deployed smoke check
        if: steps.config.outputs.configured == 'true'
        env:
          EXTERNAL_CHECK_BASE_URL: ${{ steps.config.outputs.base_url }}
          EXTERNAL_CHECK_JDBC_URL: ${{ secrets.EXTERNAL_CHECK_JDBC_URL }}
          EXTERNAL_CHECK_JDBC_USER: ${{ secrets.EXTERNAL_CHECK_JDBC_USER }}
          EXTERNAL_CHECK_JDBC_PASSWORD: ${{ secrets.EXTERNAL_CHECK_JDBC_PASSWORD }}
          EXTERNAL_CHECK_EXPECTED_BUILD_VERSION: ${{ steps.config.outputs.expected_build_version }}
          EXTERNAL_CHECK_EXPECTED_SHORT_COMMIT_ID: ${{ steps.config.outputs.expected_short_commit_id }}
          EXTERNAL_CHECK_EXPECTED_ACTIVE_PROFILE: ${{ steps.config.outputs.expected_active_profile }}
          EXTERNAL_CHECK_EXPECTED_SESSION_STORE_TYPE: ${{ steps.config.outputs.expected_session_store_type }}
          EXTERNAL_CHECK_EXPECTED_SESSION_TIMEOUT: ${{ steps.config.outputs.expected_session_timeout }}
        run: ./gradlew scheduledExternalCheck --no-daemon

      - name: Upload deployed smoke test reports
        if: always() && steps.config.outputs.configured == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: post-deploy-smoke-${{ github.run_id }}
          path: |
            build/reports/tests/externalDeploymentCheck/
            build/test-results/externalDeploymentCheck/
          if-no-files-found: warn
          retention-days: 14
