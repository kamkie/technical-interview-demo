name: OpenAPI Compatibility

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify OpenAPI compatibility
        run: ./gradlew test --tests team.jit.technicalinterviewdemo.OpenApiCompatibilityIntegrationTests --no-daemon
