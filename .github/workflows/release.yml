name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_tag: ${{ steps.image.outputs.tag }}
      image_sha_tag: ${{ steps.image.outputs.sha_tag }}
      image_digest: ${{ steps.digest.outputs.digest }}
      image_reference: ${{ steps.digest.outputs.reference }}
      package_page: ${{ steps.image.outputs.package_page }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39fdf500b386709a9a4a769f717dad447ac345b9 # v6

      - name: Verify Docker availability
        run: docker version

      - name: Resolve image coordinates
        id: image
        shell: bash
        run: |
          image_repository=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          package_name=$(basename "${image_repository}")
          package_page="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/${package_name}"
          image_tag="${GITHUB_REF_NAME}"
          image_sha_tag="sha-${GITHUB_SHA::12}"
          {
            echo "repository=${image_repository}"
            echo "package_page=${package_page}"
            echo "tag=${image_tag}"
            echo "sha_tag=${image_sha_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run full verification and build tagged image
        run: >-
          ./gradlew build
          -PdockerImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          --no-daemon

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-reports-release-${{ github.ref_name }}
          path: build/reports/security/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload static analysis artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: static-analysis-reports-release-${{ github.ref_name }}
          path: |
            build/reports/pmd/
            build/reports/security/static/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-reports-release-${{ github.ref_name }}
          path: build/reports/sbom/
          if-no-files-found: warn
          retention-days: 14

      - name: Validate tagged image with external smoke test
        run: >-
          ./gradlew externalSmokeTest
          -PexternalSmokeImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          -PdockerImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          --no-daemon

      - name: Tag immutable commit image
        run: >-
          docker tag
          ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}

      - name: Publish container image tags
        run: |
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}"

      - name: Resolve pushed image digest
        id: digest
        shell: bash
        run: |
          image_repository="${{ steps.image.outputs.repository }}"
          image_tag="${{ steps.image.outputs.tag }}"
          image_sha_tag="${{ steps.image.outputs.sha_tag }}"

          tag_digest=$(docker buildx imagetools inspect "${image_repository}:${image_tag}" --format '{{.Manifest.Digest}}')
          sha_digest=$(docker buildx imagetools inspect "${image_repository}:${image_sha_tag}" --format '{{.Manifest.Digest}}')

          if [ -z "${tag_digest}" ] || [ -z "${sha_digest}" ]; then
            echo "Failed to resolve a pushed GHCR digest for one or both release tags."
            exit 1
          fi

          if [ "${tag_digest}" != "${sha_digest}" ]; then
            echo "Release tags resolved to different digests."
            echo "${image_repository}:${image_tag} -> ${tag_digest}"
            echo "${image_repository}:${image_sha_tag} -> ${sha_digest}"
            exit 1
          fi

          {
            echo "digest=${tag_digest}"
            echo "reference=${image_repository}@${tag_digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign pushed image digest
        run: cosign sign --yes "${{ steps.digest.outputs.reference }}"

      - name: Publish provenance attestation
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          push-to-registry: true
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.digest.outputs.digest }}

      - name: Summarize release identity handoff
        shell: bash
        run: |
          {
            echo "## Release Identity Handoff"
            echo ""
            echo "- Semantic image: \`${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}\`"
            echo "- Immutable image: \`${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}\`"
            echo "- Immutable digest: \`${{ steps.digest.outputs.reference }}\`"
            echo "- Promotion check inputs:"
            echo "  - \`expected_build_version=${{ github.ref_name }}\`"
            echo "  - \`expected_short_commit_id=${GITHUB_SHA::12}\`"
            echo "  - \`expected_active_profile=prod\`"
            echo "  - \`expected_session_store_type=jdbc\`"
            echo "  - \`expected_session_timeout=15m\`"
            echo ""
            echo "Run the manual \`Post-Deploy Smoke\` workflow against the deployment base URL before promotion beyond CI-local validation."
          } >> "${GITHUB_STEP_SUMMARY}"

  create-release:
    runs-on: ubuntu-latest
    needs: publish-image
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect prerelease tag
        id: release-kind
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve previous published GitHub Release
        id: previous-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $currentTag = "${{ github.ref_name }}"
          $publishedReleases = gh release list `
            --exclude-drafts `
            --exclude-pre-releases `
            --limit 100 `
            --json tagName,publishedAt | ConvertFrom-Json

          if (-not $publishedReleases) {
            throw "No published GitHub Releases were found. Cumulative release-note range cannot be derived."
          }

          $previousRelease = @(
            $publishedReleases |
            Where-Object { $_.tagName -ne $currentTag } |
            Sort-Object { [DateTimeOffset]$_.publishedAt } -Descending
          ) | Select-Object -First 1

          if (-not $previousRelease) {
            throw "No previous published GitHub Release was found for current tag '$currentTag'."
          }

          "previous_tag=$($previousRelease.tagName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Render cumulative release notes from CHANGELOG.md
        shell: pwsh
        run: |
          ./scripts/release/render-release-notes.ps1 `
            -ChangelogPath CHANGELOG.md `
            -CurrentTag "${{ github.ref_name }}" `
            -PreviousPublishedTag "${{ steps.previous-release.outputs.previous_tag }}" `
            -TagImageReference "${{ needs.publish-image.outputs.image_repository }}:${{ needs.publish-image.outputs.image_tag }}" `
            -ShaImageReference "${{ needs.publish-image.outputs.image_repository }}:${{ needs.publish-image.outputs.image_sha_tag }}" `
            -PackagePageUrl "${{ needs.publish-image.outputs.package_page }}" `
            -OutputPath release-notes.md

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=()
          if [[ "${{ steps.release-kind.outputs.is_prerelease }}" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "${prerelease_flag[@]}"
