name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-image:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_tag: ${{ steps.image.outputs.tag }}
      image_sha_tag: ${{ steps.image.outputs.sha_tag }}
      package_page: ${{ steps.image.outputs.package_page }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify Docker availability
        run: docker version

      - name: Resolve image coordinates
        id: image
        shell: bash
        run: |
          image_repository=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          package_name=$(basename "${image_repository}")
          package_page="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/${package_name}"
          image_tag="${GITHUB_REF_NAME}"
          image_sha_tag="sha-${GITHUB_SHA::12}"
          {
            echo "repository=${image_repository}"
            echo "package_page=${package_page}"
            echo "tag=${image_tag}"
            echo "sha_tag=${image_sha_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run full verification and build tagged image
        run: >-
          ./gradlew build
          -PdockerImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          --no-daemon

      - name: Upload vulnerability scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-release-${{ github.ref_name }}
          path: build/reports/security/
          if-no-files-found: warn
          retention-days: 14

      - name: Validate tagged image with external smoke test
        run: >-
          ./gradlew externalSmokeTest
          -PexternalSmokeImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          -PdockerImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          --no-daemon

      - name: Tag immutable commit image
        run: >-
          docker tag
          ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}

      - name: Publish container image tags
        run: |
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}"

  create-release:
    runs-on: ubuntu-latest
    needs: publish-image
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $tagImageReference = "${{ needs.publish-image.outputs.image_repository }}:${{ needs.publish-image.outputs.image_tag }}"
          $shaImageReference = "${{ needs.publish-image.outputs.image_repository }}:${{ needs.publish-image.outputs.image_sha_tag }}"
          $packagePageUrl = "${{ needs.publish-image.outputs.package_page }}"

          $changelog = Get-Content -LiteralPath CHANGELOG.md -Raw
          $headingPattern = "(?m)^## \[$([Regex]::Escape($tag))\] - .+$"
          $headingMatches = [Regex]::Matches($changelog, $headingPattern)

          if ($headingMatches.Count -eq 0) {
            throw "No CHANGELOG.md section matched tag '$tag'."
          }

          if ($headingMatches.Count -gt 1) {
            throw "Multiple CHANGELOG.md sections matched tag '$tag'."
          }

          $sectionStart = $headingMatches[0].Index
          $remainingChangelog = $changelog.Substring($sectionStart)
          $sectionHeadingMatches = [Regex]::Matches(
            $remainingChangelog,
            "(?m)^## \[",
            [Text.RegularExpressions.RegexOptions]::Multiline,
            [TimeSpan]::FromSeconds(5)
          )

          if ($sectionHeadingMatches.Count -gt 1) {
            $releaseSection = $remainingChangelog.Substring(0, $sectionHeadingMatches[1].Index)
          } else {
            $releaseSection = $remainingChangelog
          }

          $releaseSection = $releaseSection.TrimEnd("`r", "`n")
          $releaseNotes = @(
            $releaseSection
            ""
            "## Release Metadata"
            ""
            "- Container image: ``$tagImageReference``"
            "- Immutable image: ``$shaImageReference``"
            "- Package page: [GitHub Container Registry package]($packagePageUrl)"
          ) -join [Environment]::NewLine

          Set-Content -LiteralPath release-notes.md -Value $releaseNotes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          --title "${{ github.ref_name }}"
          --notes-file release-notes.md
