name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker availability
        run: docker version

      - name: Resolve image coordinates
        id: image
        shell: bash
        run: |
          image_repository=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          image_tag="${GITHUB_REF_NAME}"
          image_sha_tag="sha-${GITHUB_SHA::12}"
          echo "repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${image_sha_tag}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run full verification and build tagged image
        run: >-
          ./gradlew build
          -PdockerImageName=${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          --no-daemon

      - name: Tag immutable commit image
        run: >-
          docker tag
          ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}

      - name: Publish container image tags
        run: |
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha_tag }}"
