name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Verify Docker availability
        run: docker version

      - name: Run full build
        run: ./gradlew build --no-daemon

      - name: Lint Helm chart
        run: helm lint helm/technical-interview-demo

      - name: Render Helm chart
        run: >-
          helm template technical-interview-demo
          helm/technical-interview-demo
          -f helm/technical-interview-demo/values-local.yaml

      - name: Run container smoke validation
        shell: pwsh
        run: ./scripts/ci/smoke-container.ps1 -ImageName technical-interview-demo
