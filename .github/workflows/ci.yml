name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Verify Docker availability
        run: docker version

      - name: Run full build
        run: ./gradlew build --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          disable_search: true
          fail_ci_if_error: true

      - name: Upload vulnerability scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-ci-${{ github.run_id }}
          path: build/reports/security/
          if-no-files-found: warn
          retention-days: 14

      - name: Lint Helm chart
        run: helm lint helm/technical-interview-demo

      - name: Render Helm chart
        run: >-
          helm template technical-interview-demo
          helm/technical-interview-demo
          -f helm/technical-interview-demo/values-local.yaml

      - name: Run external smoke validation
        run: >-
          ./gradlew externalSmokeTest
          -PexternalSmokeImageName=technical-interview-demo
          -PdockerImageName=technical-interview-demo
          --no-daemon
