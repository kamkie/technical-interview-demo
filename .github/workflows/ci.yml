name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  change_detection:
    runs-on: ubuntu-latest
    outputs:
      skip_heavy_ci: ${{ steps.classify.outputs.skip_heavy_ci }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          $params = @{}
          if ($env:EVENT_NAME -eq 'pull_request') {
            $params.BaseRef = $env:PR_BASE_SHA
            $params.HeadRef = $env:PR_HEAD_SHA
            $params.UseMergeBase = $true
          } else {
            $params.BaseRef = $env:BEFORE_SHA
            $params.HeadRef = $env:CURRENT_SHA
          }

          $result = & ./scripts/classify-changed-files.ps1 @params
          $isRerun = [int]$env:RUN_ATTEMPT -gt 1
          $skipHeavyCi = $result.skipHeavyValidation -and -not $isRerun
          "skip_heavy_ci=$($skipHeavyCi.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($isRerun -and $result.skipHeavyValidation) {
            'GitHub Actions rerun detected, so lightweight-only `skip_heavy_ci` was ignored.' |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

  build:
    needs: change_detection
    runs-on: ubuntu-latest

    steps:
      - name: Skip heavy CI for lightweight-only changes
        if: needs.change_detection.outputs.skip_heavy_ci == 'true'
        run: |
          echo "Only markdown or lightweight support files changed." >> "${GITHUB_STEP_SUMMARY}"
          echo "Skipping the Gradle build, Helm validation, and external smoke validation for this CI run." >> "${GITHUB_STEP_SUMMARY}"

      - name: Check out repository
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          dependency-graph: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'generate-and-upload' || 'disabled' }}

      - name: Set up Helm
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Verify Docker availability
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        run: docker version

      - name: Run full build and image vulnerability scan
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        shell: pwsh
        run: ./build.ps1 -FullBuild build imageVulnerabilityScan --no-daemon

      - name: Upload coverage to Codecov
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          use_oidc: true
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          disable_search: true
          fail_ci_if_error: true

      - name: Upload security scan artifacts
        if: always() && needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-reports-ci-${{ github.run_id }}
          path: build/reports/security/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload static analysis artifacts
        if: always() && needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: static-analysis-reports-ci-${{ github.run_id }}
          path: |
            build/reports/pmd/
            build/reports/security/static/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload SBOM artifacts
        if: always() && needs.change_detection.outputs.skip_heavy_ci != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-reports-ci-${{ github.run_id }}
          path: build/reports/sbom/
          if-no-files-found: warn
          retention-days: 14

      - name: Lint Helm chart
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        run: helm lint infra/helm/technical-interview-demo

      - name: Render Helm chart
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        run: >-
          helm template technical-interview-demo
          infra/helm/technical-interview-demo
          -f infra/helm/technical-interview-demo/values-local.yaml

      - name: Run external smoke validation
        if: needs.change_detection.outputs.skip_heavy_ci != 'true'
        shell: pwsh
        run: >-
          ./build.ps1 externalSmokeTest
          -PexternalSmokeImageName=technical-interview-demo
          -PdockerImageName=technical-interview-demo
          --no-daemon

  submit-dependency-graph:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.change_detection.outputs.skip_heavy_ci != 'true'
    needs:
      - change_detection
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Submit Gradle dependency graph
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          dependency-graph: download-and-submit
          dependency-graph-continue-on-failure: false
