apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: technical-interview-demo
  namespace: monitoring
  labels:
    app.kubernetes.io/name: technical-interview-demo
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: technical-interview-demo.rules
      rules:
        - alert: TechnicalInterviewDemoTargetDown
          expr: absent(up{namespace="technical-interview-demo",service="technical-interview-demo"}) or max(up{namespace="technical-interview-demo",service="technical-interview-demo"}) < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: technical-interview-demo target is down
            description: Prometheus has not been able to scrape the technical-interview-demo service for at least 5 minutes.
        - alert: TechnicalInterviewDemoReadinessFailing
          expr: max(kube_pod_status_ready{namespace="technical-interview-demo",condition="true",pod=~"technical-interview-demo.*"}) < 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: technical-interview-demo pods are not ready
            description: One or more technical-interview-demo pods have been unready for at least 10 minutes.
        - alert: TechnicalInterviewDemoRestartingFrequently
          expr: sum(increase(kube_pod_container_status_restarts_total{namespace="technical-interview-demo",pod=~"technical-interview-demo.*"}[15m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: technical-interview-demo pods are restarting
            description: technical-interview-demo containers restarted more than twice in the last 15 minutes.
        - alert: TechnicalInterviewDemoHighServerErrorRate
          expr: sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",status=~"5.."}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo"}[5m])), 0.001) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: technical-interview-demo is returning elevated 5xx errors
            description: More than 5% of technical-interview-demo HTTP requests have been returning 5xx responses for 10 minutes.
        - alert: TechnicalInterviewDemoAuthenticationFailuresElevated
          expr: >-
            (
              (
                sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",uri=~"/api/account|/api/account/language|/api/admin/audit-logs|/api/admin/operator-surface|/api/admin/users|/api/admin/users/.+",status=~"401|403"}[10m]))
                +
                sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",method=~"POST|PUT|DELETE",uri=~"/api/categories|/api/categories/.+|/api/localizations|/api/localizations/.+",status=~"401|403"}[10m]))
              )
              /
              clamp_min(
                sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",uri=~"/api/account|/api/account/language|/api/admin/audit-logs|/api/admin/operator-surface|/api/admin/users|/api/admin/users/.+"}[10m]))
                +
                sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",method=~"POST|PUT|DELETE",uri=~"/api/categories|/api/categories/.+|/api/localizations|/api/localizations/.+"}[10m])),
                0.001
              )
            ) > 0.20
            and
            (
              sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",uri=~"/api/account|/api/account/language|/api/admin/audit-logs|/api/admin/operator-surface|/api/admin/users|/api/admin/users/.+"}[10m]))
              +
              sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",method=~"POST|PUT|DELETE",uri=~"/api/categories|/api/categories/.+|/api/localizations|/api/localizations/.+"}[10m]))
            ) > 0.02
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: technical-interview-demo is seeing elevated auth failures
            description: More than 20% of protected technical-interview-demo requests have been returning 401 or 403 responses for at least 10 minutes.
        - alert: TechnicalInterviewDemoSessionBackedAccountErrors
          expr: >-
            (
              sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",uri=~"/api/account|/api/account/language",status=~"5.."}[10m]))
              /
              clamp_min(sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",uri=~"/api/account|/api/account/language"}[10m])), 0.001)
            ) > 0.05
            and
            sum(rate(http_server_requests_seconds_count{namespace="technical-interview-demo",uri=~"/api/account|/api/account/language"}[10m])) > 0.01
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: technical-interview-demo account requests are failing
            description: More than 5% of authenticated account requests have been returning 5xx responses for 10 minutes, which usually points to JDBC-backed session persistence or downstream database trouble.
        - alert: TechnicalInterviewDemoDatabasePoolSaturation
          expr: >-
            sum(hikaricp_connections_active{namespace="technical-interview-demo"})
            /
            clamp_min(sum(hikaricp_connections_max{namespace="technical-interview-demo"}), 1) > 0.80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: technical-interview-demo database pool is near saturation
            description: HikariCP has been using more than 80% of its configured PostgreSQL connections for at least 10 minutes.
        - alert: TechnicalInterviewDemoDatabaseConnectionTimeouts
          expr: sum(increase(hikaricp_connections_timeout_total{namespace="technical-interview-demo"}[10m])) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: technical-interview-demo is timing out waiting for database connections
            description: HikariCP recorded one or more database connection timeouts in the last 10 minutes.
        - alert: TechnicalInterviewDemoFlywayStartupCrashLooping
          expr: max_over_time(kube_pod_container_status_waiting_reason{namespace="technical-interview-demo",pod=~"technical-interview-demo.*",reason="CrashLoopBackOff"}[10m]) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: technical-interview-demo pods are crash-looping during startup
            description: technical-interview-demo pods have been stuck in CrashLoopBackOff for at least 10 minutes, which commonly indicates startup failures such as Flyway migration errors or unavailable PostgreSQL dependencies.
