apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: technical-interview-demo
  namespace: monitoring
  labels:
    app.kubernetes.io/name: technical-interview-demo
    app.kubernetes.io/component: monitoring
spec:
  namespaceSelector:
    matchNames:
      - technical-interview-demo
  selector:
    matchLabels:
      app.kubernetes.io/name: technical-interview-demo
      app.kubernetes.io/component: app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
