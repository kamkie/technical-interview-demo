apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: technical-interview-demo
  namespace: technical-interview-demo
  labels:
    app.kubernetes.io/name: technical-interview-demo
    app.kubernetes.io/component: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: technical-interview-demo
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
