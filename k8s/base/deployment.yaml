apiVersion: apps/v1
kind: Deployment
metadata:
  name: technical-interview-demo
  namespace: technical-interview-demo
  labels:
    app.kubernetes.io/name: technical-interview-demo
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: technical-interview-demo
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: technical-interview-demo
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: technical-interview-demo
          image: technical-interview-demo
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-config
                  key: DATABASE_USER
            - name: SESSION_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-config
                  key: SESSION_COOKIE_SECURE
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: DATABASE_PASSWORD
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: OIDC_CLIENT_SECRET
                  optional: true
            - name: OIDC_ISSUER_URI
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: OIDC_ISSUER_URI
                  optional: true
            - name: APP_BOOTSTRAP_INITIAL_ADMIN_IDENTITIES
              valueFrom:
                secretKeyRef:
                  name: technical-interview-demo-secrets
                  key: APP_BOOTSTRAP_INITIAL_ADMIN_IDENTITIES
                  optional: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
