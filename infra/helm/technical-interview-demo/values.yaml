replicaCount: 2

image:
  repository: ghcr.io/example/technical-interview-demo
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  profiles:
    - prod
  databaseHost: postgresql
  databasePort: "5432"
  databaseName: technical_interview_demo
  databaseUser: technical_interview_demo
  sessionCookieSecure: "true"

oauth:
  # OAuth stays opt-in even for prod deployments.
  enabled: false

secret:
  existingSecret: technical-interview-demo-secrets
  keys:
    databasePassword: DATABASE_PASSWORD
    githubClientId: GITHUB_CLIENT_ID
    githubClientSecret: GITHUB_CLIENT_SECRET
    oidcClientId: OIDC_CLIENT_ID
    oidcClientSecret: OIDC_CLIENT_SECRET
    oidcIssuerUri: OIDC_ISSUER_URI
    initialAdminIdentities: APP_BOOTSTRAP_INITIAL_ADMIN_IDENTITIES

probes:
  startup:
    path: /actuator/health/readiness
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

pod:
  terminationGracePeriodSeconds: 30
  securityContext:
    runAsNonRoot: true
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

container:
  securityContext:
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  tmpMountPath: /tmp

metrics:
  serviceMonitor:
    enabled: false
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    # Deployment-scoped scrape target, not an internet-public endpoint.
    path: /actuator/prometheus

secretExample:
  enabled: false
