{{- if .Values.secretExample.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.existingSecret }}
  labels:
    {{- include "technical-interview-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.databasePassword }}: change-me
  {{ .Values.secret.keys.githubClientId }}: ""
  {{ .Values.secret.keys.githubClientSecret }}: ""
  {{ .Values.secret.keys.oidcClientId }}: ""
  {{ .Values.secret.keys.oidcClientSecret }}: ""
  {{ .Values.secret.keys.oidcIssuerUri }}: ""
  {{ .Values.secret.keys.initialAdminIdentities }}: ""
{{- end }}
