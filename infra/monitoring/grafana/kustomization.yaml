apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: technical-interview-demo
    app.kubernetes.io/component: monitoring
configMapGenerator:
  - name: technical-interview-demo-grafana-dashboard
    files:
      - dashboards/technical-interview-demo.json
