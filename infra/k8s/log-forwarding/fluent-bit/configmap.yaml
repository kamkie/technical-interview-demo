apiVersion: v1
kind: ConfigMap
metadata:
  name: technical-interview-demo-log-forwarder
  labels:
    app.kubernetes.io/name: technical-interview-demo-log-forwarder
    app.kubernetes.io/component: logging
data:
  LOG_AGGREGATOR_HOST: logs.example.internal
  LOG_AGGREGATOR_PORT: "443"
  LOG_AGGREGATOR_URI: /ingest/technical-interview-demo
  LOG_AGGREGATOR_TLS: "On"
  LOG_AGGREGATOR_TLS_VERIFY: "On"
  fluent-bit.conf: |
    [SERVICE]
        Flush                 1
        Daemon                Off
        Log_Level             info
        Parsers_File          parsers_multiline.conf

    [INPUT]
        Name                  tail
        Tag                   technical-interview-demo.logs
        Path                  /var/log/containers/*technical-interview-demo*.log
        Parser                cri
        DB                    /var/log/fluent-bit-state/technical-interview-demo.db
        Read_From_Head        On
        Mem_Buf_Limit         20MB
        Skip_Long_Lines       On

    [FILTER]
        Name                  multiline
        Match                 technical-interview-demo.logs
        multiline.key_content log
        multiline.parser      spring_java_exception

    [FILTER]
        Name                  parser
        Match                 technical-interview-demo.logs
        Key_Name              log
        Parser                json
        Reserve_Data          On
        Preserve_Key          Off

    [FILTER]
        Name                  modify
        Match                 technical-interview-demo.logs
        Add                   app technical-interview-demo

    [OUTPUT]
        Name                  http
        Match                 technical-interview-demo.logs
        Host                  ${LOG_AGGREGATOR_HOST}
        Port                  ${LOG_AGGREGATOR_PORT}
        URI                   ${LOG_AGGREGATOR_URI}
        Format                json_lines
        tls                   ${LOG_AGGREGATOR_TLS}
        tls.verify            ${LOG_AGGREGATOR_TLS_VERIFY}
        compress              gzip

  parsers_multiline.conf: |
    [MULTILINE_PARSER]
        name          spring_java_exception
        type          regex
        flush_timeout 1000
        rule          "start_state" "/^\\d{4}-\\d{2}-\\d{2}.*(?:Exception|Error|Throwable).*$|^\\{\"@timestamp\":.*(?:Exception|Error|Throwable).*$/" "cont"
        rule          "cont" "/^(?:\\s+at\\s+.*|\\s*Caused by:.*|\\s*Suppressed:.*|\\s*\\.\\.\\. \\d+ more.*)$/" "cont"
