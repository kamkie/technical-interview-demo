apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: technical-interview-demo-log-forwarder
  labels:
    app.kubernetes.io/name: technical-interview-demo-log-forwarder
    app.kubernetes.io/component: logging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: technical-interview-demo-log-forwarder
      app.kubernetes.io/component: logging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: technical-interview-demo-log-forwarder
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.1.8
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_AGGREGATOR_HOST
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-log-forwarder
                  key: LOG_AGGREGATOR_HOST
            - name: LOG_AGGREGATOR_PORT
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-log-forwarder
                  key: LOG_AGGREGATOR_PORT
            - name: LOG_AGGREGATOR_URI
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-log-forwarder
                  key: LOG_AGGREGATOR_URI
            - name: LOG_AGGREGATOR_TLS
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-log-forwarder
                  key: LOG_AGGREGATOR_TLS
            - name: LOG_AGGREGATOR_TLS_VERIFY
              valueFrom:
                configMapKeyRef:
                  name: technical-interview-demo-log-forwarder
                  key: LOG_AGGREGATOR_TLS_VERIFY
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/parsers_multiline.conf
              subPath: parsers_multiline.conf
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: state
              mountPath: /var/log/fluent-bit-state
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: technical-interview-demo-log-forwarder
        - name: varlog
          hostPath:
            path: /var/log
        - name: state
          hostPath:
            path: /var/log/fluent-bit-state
            type: DirectoryOrCreate
