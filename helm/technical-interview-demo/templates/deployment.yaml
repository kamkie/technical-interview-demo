apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "technical-interview-demo.fullname" . }}
  labels:
    {{- include "technical-interview-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ ternary .Values.autoscaling.minReplicas .Values.replicaCount .Values.autoscaling.enabled }}
  selector:
    matchLabels:
      {{- include "technical-interview-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "technical-interview-demo.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.pod.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.pod.terminationGracePeriodSeconds }}
      containers:
        - name: technical-interview-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.container.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "technical-interview-demo.fullname" . }}-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "technical-interview-demo.fullname" . }}-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "technical-interview-demo.fullname" . }}-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "technical-interview-demo.fullname" . }}-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "technical-interview-demo.fullname" . }}-config
                  key: DATABASE_USER
            - name: SESSION_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "technical-interview-demo.fullname" . }}-config
                  key: SESSION_COOKIE_SECURE
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.databasePassword }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.githubClientId }}
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.githubClientSecret }}
                  optional: true
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.oidcClientId }}
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.oidcClientSecret }}
                  optional: true
            - name: OIDC_ISSUER_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.oidcIssuerUri }}
                  optional: true
            - name: APP_BOOTSTRAP_INITIAL_ADMIN_IDENTITIES
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.existingSecret }}
                  key: {{ .Values.secret.keys.initialAdminIdentities }}
                  optional: true
          volumeMounts:
            - name: tmp
              mountPath: {{ .Values.container.tmpMountPath }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
