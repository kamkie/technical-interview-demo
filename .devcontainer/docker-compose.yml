version: '3.8'

services:
  # PostgreSQL database service
  postgres:
    image: postgres:16-alpine
    container_name: technical-interview-demo-postgres
    environment:
      POSTGRES_DB: technical_interview_demo
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.devcontainer/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d technical_interview_demo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: technical-interview-demo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./.devcontainer/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - dev-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  dev-network:
    driver: bridge
