# Docker Compose for local PostgreSQL development

services:
  postgres:
    image: postgres:16-alpine
    container_name: technical-interview-demo-postgres
    environment:
      POSTGRES_DB: technical_interview_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
