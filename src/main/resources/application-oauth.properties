spring.config.activate.on-profile=oauth
# Identity provider configuration for optional OAuth login.
# Configure at least one provider with non-empty client credentials.
# GitHub provider: OAuth app client credentials only, no issuer URI.
app.security.oauth.providers.github.type=GITHUB
app.security.oauth.providers.github.client-id=${GITHUB_CLIENT_ID:}
app.security.oauth.providers.github.client-secret=${GITHUB_CLIENT_SECRET:}
app.security.oauth.providers.github.scope=read:user,user:email
app.security.oauth.providers.github.user-name-attribute=login
# OIDC provider: issuer-driven metadata plus client credentials.
app.security.oauth.providers.oidc.type=OIDC
app.security.oauth.providers.oidc.client-id=${OIDC_CLIENT_ID:}
app.security.oauth.providers.oidc.client-secret=${OIDC_CLIENT_SECRET:}
app.security.oauth.providers.oidc.issuer-uri=${OIDC_ISSUER_URI:}
app.security.oauth.providers.oidc.scope=openid,profile,email
app.security.oauth.providers.oidc.user-name-attribute=preferred_username
