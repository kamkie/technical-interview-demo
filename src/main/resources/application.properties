spring.application.name=technical-interview-demo

# Profile Activation
# Default to 'local' profile, can be overridden with: --spring.profiles.active=prod
# Profiles:
#   local  - Development with H2 in-memory database
#   prod   - Production with external database
#   test   - Testing with isolated H2 database(will be auto-activated by @SpringBootTest)
spring.profiles.active=local

# JPA: Common settings for all profiles
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=true

# Data: Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Health Checks & Observability
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0

# Server
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.output.ansi.enabled=DETECT

# Error Handling: Do not expose sensitive details to clients
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false

# Logging: Pattern is common to all profiles (overridden per-profile as needed)
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr([rid=%X{rid:-} trace=%X{traceId:-} span=%X{spanId:-}]){yellow} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx
