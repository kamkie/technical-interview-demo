spring.application.name=technical-interview-demo

# Profile Activation
# Default to 'local' profile, can be overridden with: --spring.profiles.active=prod
# Profiles:
#   local  - Development with PostgreSQL on localhost plus debug logging
#   prod   - Production-oriented PostgreSQL configuration
#   test   - Testing with PostgreSQL via Testcontainers (auto-activated by @SpringBootTest)
spring.profiles.active=local

# JPA: Common settings for all profiles
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=true

# Data: Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Cache configuration is provided through dedicated configuration classes under src/main/java/.../config

# Health Checks & Observability
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0
springdoc.api-docs.version=OPENAPI_3_0

# Server
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
# Keep color output automatic for local readability while remaining plain when no TTY is attached.
spring.output.ansi.enabled=DETECT
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=technical-interview-demo-session
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
app.security.admin-logins=${ADMIN_LOGINS:}
app.security.session.timeout=${server.servlet.session.timeout}
app.security.session.cookie-secure=${server.servlet.session.cookie.secure:false}
app.security.session.cookie-http-only=${server.servlet.session.cookie.http-only:true}
app.security.session.cookie-same-site=${server.servlet.session.cookie.same-site:lax}

# Error Handling: Do not expose sensitive details to clients
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false

# Logging: Text pattern is the local/test default. Production switches to JSON Lines via profile overrides.
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr([rid=%X{rid:-} trace=%X{traceId:-} span=%X{spanId:-}]){yellow} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx
