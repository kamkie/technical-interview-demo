# Production Configuration

# Database: PostgreSQL
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA: Schema validation in production (Flyway manages migrations)
spring.jpa.hibernate.ddl-auto=validate
server.servlet.session.timeout=15m
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
app.security.session.max-concurrent-sessions=1
app.security.session.max-sessions-prevents-login=true

# Logging: Minimal logging for production
logging.level.root=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
