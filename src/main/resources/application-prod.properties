# Production Configuration

# Database: PostgreSQL (placeholder for future migration from Phase 1.1)
# After migration, uncomment and update these:
# spring.datasource.url=jdbc:postgresql://localhost:5432/technical_interview_demo
# spring.datasource.username=app_user
# spring.datasource.password=${DATABASE_PASSWORD:changeme}
# spring.datasource.hikari.maximum-pool-size=20
