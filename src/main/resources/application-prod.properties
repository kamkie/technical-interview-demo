# For now, continue with H2 until PostgreSQL migration in Phase 1.1
spring.datasource.url=jdbc:h2:tcp://localhost/./demo-db;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# JPA: Schema validation in production (Flyway manages migrations)
spring.jpa.hibernate.ddl-auto=validate

# Logging: Minimal logging for production
logging.level.root=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
