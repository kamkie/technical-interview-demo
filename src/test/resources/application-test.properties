# Test Configuration

# Database: PostgreSQL via Testcontainers (connection details come from @ServiceConnection)
# JPA: Flyway owns schema creation during tests, Hibernate validates the mapping
spring.jpa.hibernate.ddl-auto=validate

# Logging: Warnings only during tests (reduce noise)
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.test=INFO
