# Test Configuration
# Database: PostgreSQL via Testcontainers (connection details come from @ServiceConnection)
# JPA: Flyway owns schema creation during tests, Hibernate validates the mapping
spring.jpa.hibernate.ddl-auto=validate
server.servlet.session.cookie.secure=false
app.bootstrap.initial-admin-identities=github:admin-user,github:second-admin
app.bootstrap.seed.demo-data=true
# Logging: Warnings only during tests (reduce noise)
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.test=INFO
